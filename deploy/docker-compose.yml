# deploy/docker-compose.yml — run from deploy/:
#   docker compose up web api                      # app only, no proxy
#   docker compose --profile dev up web-dev api    # web/ not buildable yet? dev-mount fallback
#   COMPOSE_PROFILES=pomerium docker compose up    # + identity-aware proxy (POMERIUM_ENABLED=true)
#   docker compose --profile tool up tool-runtime  # one trained intern, artifact mounted in
#
# NOTE: compose profiles can't read POMERIUM_ENABLED directly — when you flip
# POMERIUM_ENABLED=true in ../.env, also activate the profile (COMPOSE_PROFILES=pomerium).

name: intern

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
# All LLM/sponsor env (LLM_PROVIDER, OPENAI_API_KEY, OPENAI_MODEL, ZERO_MODE,
    # NEXLA_MODE, POMERIUM_ENABLED, ...) passes through from repo-root .env.
    # Don't duplicate them under `environment:` — shell-interpolated defaults
    # there would override the env_file values.
    env_file:
      - path: ../.env
        required: false
    volumes:
      - ../data:/app/data
      - ../mock:/app/mock

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

  # Fallback while web/ is still landing: bind-mount + `npm run dev`.
  # Mutually exclusive with `web` (same host port 3000).
  web-dev:
    image: node:20-alpine
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ../web:/app
    depends_on:
      - api

  pomerium:
    image: pomerium/pomerium:latest
    profiles: ["pomerium"]
    ports:
      - "443:443"
    volumes:
      - ./pomerium/config.yaml:/pomerium/config.yaml:ro
    depends_on:
      - api

  # One trained intern (the Akash workload, run locally). Same image for every
  # intern; point ARTIFACT_HOST_DIR at data/jobs/<job_id>/artifact.
  tool-runtime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.tool-runtime
    profiles: ["tool"]
    ports:
      - "8080:8080"
    environment:
      TOOL_SLUG: ${TOOL_SLUG:-andrei-dispatch}
    volumes:
      - ${ARTIFACT_HOST_DIR:-../data/artifact}:/artifact:ro
